<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Political Briefing | Consensus Core</title>
<link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet">
<style>
  :root {
    --bg: #06060e;
    --surface: #0e0e1c;
    --surface2: #141422;
    --border: #1e1e32;
    --border-bright: #2a2a45;
    --green: #4de88e;
    --green-dim: rgba(77,232,142,0.08);
    --green-mid: rgba(77,232,142,0.35);
    --green-glow: rgba(77,232,142,0.18);
    --text: #e8e8f2;
    --text-muted: #6868a0;
    --text-body: #9898c0;
    --text-dim: #3a3a60;
  }

  * { box-sizing: border-box; margin: 0; padding: 0; -webkit-tap-highlight-color: transparent; }
  html, body { height: 100%; overflow: hidden; }

  body {
    background: var(--bg);
    font-family: 'Inter', sans-serif;
    color: var(--text);
  }

  .screen {
    position: fixed; inset: 0;
    display: flex; flex-direction: column;
    overflow: hidden;
    transition: transform 0.32s cubic-bezier(0.4,0,0.2,1), opacity 0.32s ease;
  }
  .screen.hidden {
    transform: translateX(100%);
    opacity: 0;
    pointer-events: none;
  }

  /* MASTHEAD */
  .masthead {
    background: var(--surface);
    border-bottom: 1px solid var(--border);
    padding: 14px 18px 12px;
    display: flex; flex-direction: column; align-items: center;
    flex-shrink: 0; position: relative;
  }
  .masthead::after {
    content: '';
    position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.6;
  }
  .masthead-logo {
    height: 28px; margin-bottom: 8px;
    filter: none;
    border-radius: 6px;
    padding: 4px 10px;
    background: rgba(255,255,255,0.92);
  }
  .masthead-sub {
    font-size: 10px; font-weight: 500;
    letter-spacing: 0.14em; text-transform: uppercase;
    color: var(--text-muted);
  }
  .masthead-tag {
    display: inline-block; margin-top: 6px;
    padding: 2px 10px;
    background: var(--green-dim);
    border: 1px solid rgba(77,232,142,0.22);
    border-radius: 20px;
    font-size: 9px; font-weight: 600;
    letter-spacing: 0.1em; text-transform: uppercase;
    color: var(--green);
  }

  /* GRID */
  #gridScreen .scroll-body {
    flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch;
    padding: 14px 14px 24px;
  }
  .person-grid {
    display: grid; grid-template-columns: 1fr 1fr; gap: 10px;
  }

  .person-tile {
    background: var(--surface);
    border-radius: 10px; overflow: hidden;
    border: 1px solid var(--border);
    cursor: pointer;
    animation: fadeUp 0.3s ease both;
    transition: border-color 0.15s, transform 0.12s;
  }
  .person-tile:active { transform: scale(0.97); }
  .person-tile:active, .person-tile:hover { border-color: rgba(77,232,142,0.35); }
  .person-tile:nth-child(1) { animation-delay:0.04s }
  .person-tile:nth-child(2) { animation-delay:0.08s }
  .person-tile:nth-child(3) { animation-delay:0.12s }
  .person-tile:nth-child(4) { animation-delay:0.16s }
  .person-tile:nth-child(5) { animation-delay:0.20s }
  .person-tile:nth-child(6) { animation-delay:0.24s }

  .tile-photo-wrap {
    position: relative; width: 100%; padding-top: 100%;
    background: var(--surface2); overflow: hidden;
  }
  .tile-photo-wrap img {
    position: absolute; inset: 0; width: 100%; height: 100%;
    object-fit: cover; object-position: center top; display: block;
  }
  .tile-initials {
    position: absolute; inset: 0;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Space Grotesk', sans-serif;
    font-size: 32px; font-weight: 700; color: var(--green);
    background: var(--surface2);
  }
  .tile-photo-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; height: 35%;
    background: linear-gradient(to top, var(--surface) 0%, transparent 100%);
  }
  .tile-green-bar {
    height: 2px;
    background: var(--green);
    opacity: 0.8;
  }
  .tile-info { padding: 9px 10px 11px; }
  .tile-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 13px; font-weight: 600;
    color: var(--text); line-height: 1.2; margin-bottom: 3px;
  }
  .tile-role-label {
    font-size: 10px; font-weight: 400; color: var(--text-muted);
    line-height: 1.3; text-transform: uppercase; letter-spacing: 0.06em;
  }
  .tile-cta {
    display: flex; align-items: center; justify-content: space-between;
    margin-top: 8px; padding-top: 7px; border-top: 1px solid var(--border);
  }
  .tile-cta-text {
    font-size: 9px; font-weight: 600; color: var(--green);
    letter-spacing: 0.1em; text-transform: uppercase;
  }
  .tile-cta-arrow { font-size: 14px; color: var(--green); }

  /* CONTEXT TILE */
  .context-tile {
    grid-column: 1 / -1;
    background: var(--surface);
    border: 1px solid var(--border);
    border-radius: 10px; padding: 14px 16px;
    cursor: pointer;
    animation: fadeUp 0.3s ease 0.28s both;
    transition: border-color 0.15s, opacity 0.12s;
    display: flex; align-items: center; justify-content: space-between;
    position: relative; overflow: hidden;
  }
  .context-tile::before {
    content: '';
    position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--green);
  }
  .context-tile:active { opacity: 0.8; border-color: rgba(77,232,142,0.35); }
  .context-tile-eyebrow {
    font-size: 9px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--green); margin-bottom: 4px;
  }
  .context-tile-heading {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; color: var(--text); font-weight: 600; margin-bottom: 2px;
  }
  .context-tile-sub { font-size: 11px; color: var(--text-muted); }
  .context-tile-arrow { font-size: 20px; color: var(--green); flex-shrink: 0; margin-left: 12px; }

  /* FOOTER */
  .footer {
    text-align: center; padding: 6px 0 8px;
    font-size: 9px; color: var(--text-dim);
    letter-spacing: 0.1em; text-transform: uppercase;
    flex-shrink: 0; background: var(--bg);
  }

  /* DETAIL SCREEN */
  #detailScreen .detail-header {
    background: var(--surface);
    display: flex; align-items: center; gap: 10px;
    padding: 12px 14px;
    border-bottom: 1px solid var(--border);
    flex-shrink: 0; position: relative;
  }
  #detailScreen .detail-header::after {
    content: '';
    position: absolute; bottom: -1px; left: 0; right: 0; height: 1px;
    background: linear-gradient(90deg, transparent, var(--green), transparent);
    opacity: 0.6;
  }
  .back-btn {
    background: var(--surface2); border: 1px solid var(--border-bright);
    border-radius: 20px; color: var(--text-muted);
    font-size: 12px; font-family: 'Inter', sans-serif;
    padding: 5px 13px; cursor: pointer; flex-shrink: 0;
    transition: border-color 0.12s, color 0.12s;
  }
  .back-btn:active { border-color: var(--green); color: var(--green); }
  .detail-hdr-text { flex: 1; min-width: 0; }
  .detail-hdr-name {
    font-family: 'Space Grotesk', sans-serif;
    font-size: 15px; font-weight: 600; line-height: 1.2;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    color: var(--text);
  }
  .detail-hdr-title {
    font-size: 10px; color: var(--text-muted); margin-top: 2px;
    white-space: nowrap; overflow: hidden; text-overflow: ellipsis;
    text-transform: uppercase; letter-spacing: 0.05em;
  }

  #detailScreen .scroll-body { flex: 1; overflow-y: auto; -webkit-overflow-scrolling: touch; }

  .detail-photo-wrap {
    position: relative; width: 100%; height: 200px; overflow: hidden;
    background: var(--surface2);
  }
  .detail-photo {
    width: 100%; height: 100%;
    object-fit: cover; object-position: center top; display: block;
  }
  .detail-photo-overlay {
    position: absolute; bottom: 0; left: 0; right: 0; height: 50%;
    background: linear-gradient(to top, var(--bg) 0%, transparent 100%);
  }
  .detail-photo-fallback {
    width: 100%; height: 200px;
    display: flex; align-items: center; justify-content: center;
    background: var(--surface2);
    font-family: 'Space Grotesk', sans-serif;
    font-size: 64px; font-weight: 700; color: var(--green);
  }

  .detail-body { padding: 18px 18px 44px; }

  .section-label {
    font-size: 9px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--text-dim); margin-bottom: 8px;
  }
  .detail-role-text {
    font-size: 14px; line-height: 1.7; color: var(--text-body);
    margin-bottom: 20px; padding-bottom: 18px;
    border-bottom: 1px solid var(--border);
  }

  .hook-block {
    background: var(--surface2);
    border: 1px solid var(--border-bright);
    border-radius: 8px;
    padding: 14px 16px 14px 20px;
    position: relative; overflow: hidden;
    margin-bottom: 20px;
  }
  .hook-block::before {
    content: ''; position: absolute; left: 0; top: 0; bottom: 0; width: 3px;
    background: var(--green);
  }
  .hook-label {
    font-size: 9px; font-weight: 600; letter-spacing: 0.16em;
    text-transform: uppercase; color: var(--green); margin-bottom: 8px;
  }
  .hook-text {
    font-size: 14px; line-height: 1.7; color: var(--text);
  }

  .points-list { list-style: none; }
  .points-list li {
    display: flex; gap: 10px;
    font-size: 13px; line-height: 1.6; color: var(--text-body);
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .points-list li:last-child { border-bottom: none; }
  .points-list li::before {
    content: '›'; color: var(--green); font-weight: 700;
    flex-shrink: 0; font-size: 16px; line-height: 1.4;
  }

  .context-fact-list { list-style: none; }
  .context-fact-list li {
    display: flex; gap: 10px;
    font-size: 13px; line-height: 1.6; color: var(--text-body);
    padding: 9px 0; border-bottom: 1px solid var(--border);
  }
  .context-fact-list li:last-child { border-bottom: none; }
  .context-fact-list li::before {
    content: '›'; color: var(--green); font-weight: 700;
    flex-shrink: 0; font-size: 16px; line-height: 1.4;
  }

  @keyframes fadeUp {
    from { opacity:0; transform:translateY(10px); }
    to   { opacity:1; transform:translateY(0); }
  }
</style>
</head>

function buildGrid() {
  const grid = document.getElementById('personGrid');
  grid.innerHTML = '';

  people.forEach(p => {
    const tile = document.createElement('div');
    tile.className = 'person-tile';
    tile.onclick = () => openPerson(p.id);

    const photoSrc = photos[p.id];
    const photoHtml = photoSrc
      ? `<img src="${photoSrc}" alt="${p.name}" onerror="this.style.display='none';this.nextElementSibling.style.display='flex';">
         <div class="tile-initials" style="display:none">${p.initials}</div>`
      : `<div class="tile-initials">${p.initials}</div>`;

    tile.innerHTML = `
      <div class="tile-photo-wrap">
        ${photoHtml}
        <div class="tile-photo-overlay"></div>
      </div>
      <div class="tile-green-bar"></div>
      <div class="tile-info">
        <div class="tile-name">${p.name}</div>
        <div class="tile-role-label">${p.shortTitle}</div>
        <div class="tile-cta">
          <span class="tile-cta-text">View Briefing</span>
          <span class="tile-cta-arrow">›</span>
        </div>
      </div>
    `;
    grid.appendChild(tile);
  });

  const ctx = document.createElement('div');
  ctx.className = 'context-tile';
  ctx.onclick = openContext;
  ctx.innerHTML = `
    <div>
      <div class="context-tile-eyebrow">Quick Reference</div>
      <div class="context-tile-heading">Project at a Glance</div>
      <div class="context-tile-sub">Key facts for any conversation</div>
    </div>
    <div class="context-tile-arrow">›</div>
  `;
  grid.appendChild(ctx);
}

function showDetail() {
  document.querySelector('#detailScreen .scroll-body').scrollTop = 0;
  document.getElementById('gridScreen').classList.add('hidden');
  document.getElementById('detailScreen').classList.remove('hidden');
}

function openPerson(id) {
  const p = people.find(x => x.id === id);
  if (!p) return;

  document.getElementById('dName').textContent = p.name;
  document.getElementById('dTitle').textContent = p.title;

  const photoSrc = photos[p.id];
  const photoHtml = photoSrc
    ? `<div class="detail-photo-wrap">
         <img class="detail-photo" src="${photoSrc}" alt="${p.name}"
           onerror="this.parentElement.innerHTML='<div class=\'detail-photo-fallback\'>${p.initials}</div>'">
         <div class="detail-photo-overlay"></div>
       </div>`
    : `<div class="detail-photo-fallback">${p.initials}</div>`;

  document.getElementById('dPhotoArea').innerHTML = photoHtml;

  document.getElementById('dBody').innerHTML = `
    <div class="section-label">Who They Are</div>
    <div class="detail-role-text">${p.context}</div>
    <div class="hook-block">
      <div class="hook-label">Lead Message</div>
      <div class="hook-text">${p.hook}</div>
    </div>
    <div class="section-label">Talking Points</div>
    <ul class="points-list">
      ${p.points.map(pt => `<li>${pt}</li>`).join('')}
    </ul>
  `;

  showDetail();
}

function openContext() {
  document.getElementById('dName').textContent = 'Project at a Glance';
  document.getElementById('dTitle').textContent = 'Île des Chênes Industrial Campus';
  document.getElementById('dPhotoArea').innerHTML = '';

  document.getElementById('dBody').innerHTML = `
    <div class="section-label">Key Facts</div>
    <ul class="context-fact-list">
      ${projectFacts.map(f => `<li>${f}</li>`).join('')}
    </ul>
    <br>
    <div class="hook-block">

      <div class="hook-text">Industrial Campus. AI Data Centre foundation. Grid balancing asset. Union jobs. Indigenous participation pathways. Year-round food production. Manitoba has watched too many investments of this scale land elsewhere. This one wants to be here.</div>
    </div>
  `;

  showDetail();
}

function goBack() {
  document.getElementById('detailScreen').classList.add('hidden');
  document.getElementById('gridScreen').classList.remove('hidden');
}
